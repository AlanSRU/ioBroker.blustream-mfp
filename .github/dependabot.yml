# Dependabot will run on day 5 of each month at 02:42 (Europe/Berlin timezone)
version: 2
updates:

  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'cron'
      timezone: 'Europe/Berlin'
      cronjob: '42 2 5 * *'
    open-pull-requests-limit: 15
    cooldown:
      default-days: 7

  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'cron'
      timezone: 'Europe/Berlin'
      cronjob: '42 2 5 * *'
    open-pull-requests-limit: 15
    cooldown:
      default-days: 7
